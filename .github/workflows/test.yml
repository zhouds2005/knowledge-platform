name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: knowledge_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Push DB schema
        run: npx drizzle-kit push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowledge_platform

      - name: Seed database
        run: npx tsx server/db/seed.ts
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowledge_platform
          SESSION_SECRET: ci-secret

      - name: Run vitest (unit + integration)
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowledge_platform
          SESSION_SECRET: ci-secret

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start servers
        run: |
          npx tsx server/index.ts &
          npx vite --host 0.0.0.0 &
          # wait for both servers to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:3002/api/health > /dev/null 2>&1 && curl -s http://localhost:5173 > /dev/null 2>&1; then
              echo "Servers ready"
              break
            fi
            echo "Waiting... ($i)"
            sleep 2
          done
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowledge_platform
          SESSION_SECRET: ci-secret
          NEXTCLOUD_URL: http://localhost:8080
          NEXTCLOUD_USER: ci
          NEXTCLOUD_PASS: ci

      - name: Run Playwright
        run: npx playwright test --project=chromium
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowledge_platform
          SESSION_SECRET: ci-secret
          CI: true
